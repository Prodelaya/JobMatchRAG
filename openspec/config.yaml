schema: spec-driven

strict_tdd: true

context: |
  Tech stack: Python package on setuptools with src layout under `src/jobmatchrag`.
  Architecture: living docs define a FastAPI + Celery modular monolith; the implemented slice is the pure-Python `source_ingestion` framework.
  Testing: pytest runner with unit + integration suites under `tests/`; no E2E runner and no coverage plugin detected.
  Style: `.venv/bin/python -m ruff check .`, `.venv/bin/python -m mypy src`, `.venv/bin/python -m pytest`.

testing:
  detected_at: 2026-04-16
  runner: pytest
  test_command: .venv/bin/python -m pytest
  framework: pytest
  layers:
    unit: pytest
    integration: pytest
    e2e: ""
  coverage_command: ""
  quality:
    linter: .venv/bin/python -m ruff check .
    type_checker: .venv/bin/python -m mypy src
    formatter: ""

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    instructions:
      - Follow existing code patterns and conventions
    tdd: true
    test_command: ".venv/bin/python -m pytest"
  verify:
    instructions:
      - Run tests if test infrastructure exists
      - Compare implementation against every spec scenario
    test_command: ".venv/bin/python -m pytest"
    build_command: ""
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas (large removals)

verify:
  - .venv/bin/python -m ruff check .
  - .venv/bin/python -m mypy src
  - .venv/bin/python -m pytest
